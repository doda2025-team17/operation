apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-service
  labels:
    app: model-service
spec:
  replicas: {{ .Values.model.replicaCount }}
  selector:
    matchLabels:
      app: model-service
  template:
    metadata:
      labels:
        app: model-service
    spec:
      containers:
      - name: model-service
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.model.image }}:{{ .Values.model.tag }}"
        ports:
        - containerPort: {{ .Values.model.containerPort }}
        env:
        - name: MODEL_SERVICE_PORT
          value: "{{ .Values.model.containerPort }}"
        - name: MODEL_DIR
          value: "{{ .Values.model.modelDir }}"
        - name: MODEL_URL
          valueFrom:
            secretKeyRef:
              name: model-secret
              key: model-url
        {{- if .Values.storage.enabled }}
        volumeMounts:
        - name: model-storage
          mountPath: {{ .Values.model.modelDir }}
        - name: shared-storage
          mountPath: {{ .Values.storage.appMountPath }}
        {{- end }}
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.model.containerPort }}
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.model.containerPort }}
          initialDelaySeconds: 30
          periodSeconds: 10
      {{- if .Values.storage.enabled }}
      volumes:
      - name: model-storage
        hostPath:
          path: {{ .Values.global.sharedStoragePath }}/models
          type: DirectoryOrCreate
      - name: shared-storage
        hostPath:
          path: {{ .Values.global.sharedStoragePath }}
          type: DirectoryOrCreate
      {{- end }}