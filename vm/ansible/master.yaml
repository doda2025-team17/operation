---
- name: Import general setup for all nodes
  import_playbook: general.yaml

- name: Import control plane setup
  import_playbook: ctrl.yaml

- name: Import worker node setup  
  import_playbook: node.yaml

- name: Import finalization steps
  import_playbook: finalization.yaml

- name: Initialize shared storage on all nodes
  hosts: all
  become: yes
  tasks:
    - name: Create shared storage directory
      file:
        path: /mnt/shared
        state: directory
        owner: vagrant
        group: vagrant
        mode: '0775'

    - name: Create models subdirectory
      file:
        path: /mnt/shared/models
        state: directory
        owner: vagrant
        group: vagrant
        mode: '0775'